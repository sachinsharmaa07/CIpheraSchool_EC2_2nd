<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CIpherCalculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="calculator" aria-label="CIpherCalculator">
        <div class="topbar">
          <span class="brand">CIpherCalculator</span>
          <button id="themeToggle" class="theme-toggle" aria-pressed="false">
            Light
          </button>
        </div>
        <header class="display" aria-live="polite">
          <div id="history" class="display-history">&nbsp;</div>
          <div id="output" class="display-output">0</div>
        </header>

        <section class="keys" role="group" aria-label="Calculator keys">
          <button class="key key-fn" data-action="clear">AC</button>
          <button class="key key-fn" data-action="toggle-sign">+/-</button>
          <button class="key key-fn" data-action="percent">%</button>
          <button class="key key-op" data-action="operator" data-value="/">÷</button>

          <button class="key key-fn" data-action="constant" data-value="pi">pi</button>
          <button class="key key-fn" data-action="constant" data-value="e">e</button>
          <button class="key key-op" data-action="operator" data-value="^">x^y</button>
          <button class="key key-fn" data-action="function" data-value="inv">1/x</button>

          <button class="key key-fn" data-action="function" data-value="sin">sin</button>
          <button class="key key-fn" data-action="function" data-value="cos">cos</button>
          <button class="key key-fn" data-action="function" data-value="tan">tan</button>
          <button class="key key-op" data-action="operator" data-value="*">×</button>

          <button class="key key-fn" data-action="function" data-value="ln">ln</button>
          <button class="key key-fn" data-action="function" data-value="log">log</button>
          <button class="key key-fn" data-action="function" data-value="sqrt">√</button>
          <button class="key key-op" data-action="operator" data-value="-">−</button>

          <button class="key" data-action="number" data-value="7">7</button>
          <button class="key" data-action="number" data-value="8">8</button>
          <button class="key" data-action="number" data-value="9">9</button>
          <button class="key key-op" data-action="operator" data-value="+">+</button>

          <button class="key" data-action="number" data-value="4">4</button>
          <button class="key" data-action="number" data-value="5">5</button>
          <button class="key" data-action="number" data-value="6">6</button>
          <button class="key key-fn" data-action="function" data-value="pow2">x²</button>

          <button class="key" data-action="number" data-value="1">1</button>
          <button class="key" data-action="number" data-value="2">2</button>
          <button class="key" data-action="number" data-value="3">3</button>
          <button class="key key-fn" data-action="function" data-value="pow3">x³</button>

          <button class="key key-zero" data-action="number" data-value="0">0</button>
          <button class="key" data-action="decimal" data-value=".">.</button>
          <button class="key key-eq" data-action="equals">=</button>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
